<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" fill="none">
  <rect width="480" height="280" rx="12" fill="#F8FAFC"/>
  <text x="24" y="32" fill="#334155" font-family="system-ui,sans-serif" font-size="14" font-weight="700">DDI Identification · 750 scenarios</text>
  <rect x="40" y="60" width="120" height="80" rx="10" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="100" y="92" fill="#92400E" font-size="11" font-weight="700" text-anchor="middle">Pointwise</text>
  <text x="100" y="110" fill="#78716C" font-size="10" text-anchor="middle">2-drug pair</text>
  <text x="100" y="126" fill="#78716C" font-size="10" text-anchor="middle">DDI ID</text>
  <path d="M168 100 L200 100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="180" y="60" width="120" height="80" rx="10" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="240" y="92" fill="#92400E" font-size="11" font-weight="700" text-anchor="middle">Pairwise</text>
  <text x="240" y="110" fill="#78716C" font-size="10" text-anchor="middle">3-drug combo</text>
  <path d="M308 100 L340 100" stroke="#94A3B8" stroke-width="2"/>
  <rect x="320" y="60" width="120" height="80" rx="10" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="380" y="92" fill="#92400E" font-size="11" font-weight="700" text-anchor="middle">Listwise</text>
  <text x="380" y="110" fill="#78716C" font-size="10" text-anchor="middle">46 drugs</text>
  <rect x="80" y="170" width="320" height="72" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="240" y="198" fill="#C2410C" font-size="11" font-weight="600" text-anchor="middle">Precision · Recall · F1 · Self-consistency</text>
  <text x="240" y="218" fill="#78716C" font-size="10" text-anchor="middle">github.com/AIChemist-Lab/LLM-DDI</text>
  <defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94A3B8"/></marker></defs>
</svg>
